<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المستخدمين | Smart ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue:#2563eb; --dark:#0f172a; --mid:#475569; --border:#e2e8f0; }
  body { font-family: 'Tajawal', sans-serif; background: #f4f7f9; color: var(--dark); padding: 24px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 1.3rem; }
  .back-link { color: var(--blue); text-decoration: none; font-weight: 600; font-size: .9rem; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  input, select {
    padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: .9rem;
  }
  #search-input { flex: 1; min-width: 200px; }
  button {
    padding: 10px 16px; border: none; border-radius: 8px; background: var(--blue); color: #fff;
    font-family: inherit; font-weight: 700; font-size: .9rem; cursor: pointer;
  }
  button.secondary { background: #e2e8f0; color: var(--dark); }
  button.danger { background: #dc2626; }
  .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 18px; margin-bottom: 20px; }
  .add-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .add-form input { flex: 1; min-width: 150px; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: right; }
  th { color: var(--mid); font-size: .8rem; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
  .badge.active { background: #dcfce7; color: #16a34a; }
  .badge.inactive { background: #fee2e2; color: #dc2626; }
  .badge.admin { background: #dbeafe; color: #2563eb; margin-left: 4px; }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .row-actions button { padding: 6px 10px; font-size: .78rem; }
  #msg { font-size: .85rem; margin-bottom: 12px; display: none; padding: 10px; border-radius: 8px; }
  #msg.error { background: #fef2f2; color: #dc2626; display: block; }
  #msg.success { background: #dcfce7; color: #16a34a; display: block; }
  #denied { text-align: center; padding: 60px 20px; color: var(--mid); display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <h1><i class="fas fa-users-cog"></i> إدارة المستخدمين</h1>
    <a href="/" class="back-link"><i class="fas fa-arrow-right"></i> رجوع للموقع</a>
  </div>

  <div id="denied">
    <p>غير مصرح لك بالوصول لهذه الصفحة.</p>
  </div>

  <div id="admin-area" style="display:none;">
    <div id="msg"></div>

    <div class="card">
      <div class="add-form">
        <input type="text" id="new-name" placeholder="الاسم">
        <input type="text" id="new-username" placeholder="اسم المستخدم (Username)">
        <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;white-space:nowrap;">
          <input type="checkbox" id="new-is-admin" style="width:auto;"> مدير (Admin)
        </label>
        <button id="add-btn"><i class="fas fa-plus"></i> إضافة مستخدم</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="search-input" placeholder="بحث بالاسم أو اسم المستخدم...">
      <button class="secondary" id="refresh-btn"><i class="fas fa-rotate"></i> تحديث</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>اسم المستخدم</th>
            <th>الحالة</th>
            <th>الصلاحية</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const msgBox = document.getElementById('msg');
function showMsg(text, type) {
  msgBox.textContent = text;
  msgBox.className = type;
  setTimeout(() => { msgBox.className = ''; msgBox.textContent = ''; }, 4000);
}

async function checkAdmin() {
  try {
    const res = await fetch('/.netlify/functions/me');
    if (!res.ok) throw new Error();
    const me = await res.json();
    if (!me.is_admin) {
      document.getElementById('denied').style.display = 'block';
      return;
    }
    document.getElementById('admin-area').style.display = 'block';
    loadUsers();
  } catch {
    document.getElementById('denied').style.display = 'block';
  }
}

async function loadUsers() {
  const q = document.getElementById('search-input').value.trim();
  const url = '/.netlify/functions/admin-users' + (q ? ('?q=' + encodeURIComponent(q)) : '');
  const res = await fetch(url);
  const users = await res.json();
  renderUsers(users);
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';
  users.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(u.name)}</td>
      <td>${escapeHtml(u.username)}</td>
      <td><span class="badge ${u.status}">${u.status === 'active' ? 'مفعّل' : 'موقوف'}</span></td>
      <td>${u.is_admin ? '<span class="badge admin">Admin</span>' : '—'}</td>
      <td class="row-actions">
        <button class="secondary toggle-btn" data-id="${u.id}" data-status="${u.status}">
          ${u.status === 'active' ? 'إيقاف' : 'تفعيل'}
        </button>
        <button class="danger delete-btn" data-id="${u.id}" data-name="${escapeHtml(u.name)}">حذف</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

document.getElementById('add-btn').addEventListener('click', async () => {
  const name = document.getElementById('new-name').value.trim();
  const username = document.getElementById('new-username').value.trim();
  const is_admin = document.getElementById('new-is-admin').checked;
  if (!name || !username) { showMsg('الاسم واسم المستخدم مطلوبان', 'error'); return; }

  const res = await fetch('/.netlify/functions/admin-users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, username, is_admin }),
  });
  const data = await res.json();
  if (res.ok) {
    document.getElementById('new-name').value = '';
    document.getElementById('new-username').value = '';
    document.getElementById('new-is-admin').checked = false;
    showMsg('تمت إضافة المستخدم', 'success');
    loadUsers();
  } else {
    showMsg(data.error || 'تعذر إنشاء المستخدم', 'error');
  }
});

document.getElementById('users-tbody').addEventListener('click', async (e) => {
  const toggleBtn = e.target.closest('.toggle-btn');
  const deleteBtn = e.target.closest('.delete-btn');

  if (toggleBtn) {
    const id = toggleBtn.dataset.id;
    const newStatus = toggleBtn.dataset.status === 'active' ? 'inactive' : 'active';
    const res = await fetch(`/.netlify/functions/admin-users?id=${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    if (res.ok) { showMsg('تم تحديث الحالة', 'success'); loadUsers(); }
    else showMsg('تعذر التحديث', 'error');
  }

  if (deleteBtn) {
    const id = deleteBtn.dataset.id;
    const name = deleteBtn.dataset.name;
    if (!confirm(`هل أنت متأكد من حذف "${name}"؟ لا يمكن التراجع عن هذا الإجراء.`)) return;
    const res = await fetch(`/.netlify/functions/admin-users?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (res.ok) { showMsg('تم الحذف', 'success'); loadUsers(); }
    else showMsg('تعذر الحذف', 'error');
  }
});

document.getElementById('search-input').addEventListener('input', debounce(loadUsers, 300));
document.getElementById('refresh-btn').addEventListener('click', loadUsers);

function debounce(fn, delay) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
}

checkAdmin();
</script>
</body>
</html>
