<section class="tab-page" id="page-mindmap">

  <div class="page-hero" style="background:linear-gradient(135deg,#eef2ff,#e0e7ff)">
    <i class="fas fa-diagram-project" style="font-size:2.5rem;color:#4f46e5;margin-bottom:12px"></i>
    <h1>الخريطة الذهنية للمبيعات</h1>

    <p class="mm-hint"><i class="fas fa-magnifying-glass-plus"></i> اضغط على الصورة لتكبيرها</p>

<script>

};
window.closeMindMapZoom = function(){
  document.getElementById('mm-zoom-overlay').classList.remove('open');
};
</script>
