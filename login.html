<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | Smart ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: #f4f7f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 30px rgba(0,0,0,.08);
    border: 1px solid #e2e8f0;
  }
  .brand { text-align: center; margin-bottom: 24px; }
  .brand-logo { font-size: 1.4rem; font-weight: 800; color: #34B7F1; }
  .brand-sub { font-size: .85rem; color: #475569; margin-top: 4px; }
  label { display: block; font-size: .85rem; font-weight: 600; color: #0f172a; margin-bottom: 8px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-family: inherit;
    font-size: .95rem;
    margin-bottom: 16px;
  }
  input:focus { outline: none; border-color: #2563eb; }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: #fff;
    font-family: inherit;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: .2s;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { opacity: .6; cursor: not-allowed; }
  .error-msg {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: .85rem;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-logo">Smart ERP</div>
      <div class="brand-sub">الحقيبة التدريبية للموظف الجديد</div>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <form id="login-form">
      <label for="username">اسم المستخدم</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      <button type="submit" id="submit-btn">دخول</button>
    </form>
  </div>

<script src="auth-client.js"></script>
<script>
const form = document.getElementById('login-form');
const errorMsg = document.getElementById('error-msg');
const submitBtn = document.getElementById('submit-btn');

// If already logged in with a still-active account, skip straight to the site.
(async () => {
  if (getToken() && (await getSessionUser())) location.href = 'index.html';
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = 'جارٍ التحقق...';

  const username = document.getElementById('username').value.trim();

  try {
    const user = await findUser(username);
    if (!user || user.status !== 'active') {
      errorMsg.textContent = 'اسم المستخدم غير صحيح أو غير مفعّل';
      errorMsg.style.display = 'block';
      return;
    }

    const token = await createSession(username);
    if (!token) {
      errorMsg.textContent = 'تعذر تسجيل الدخول، حاول مرة أخرى';
      errorMsg.style.display = 'block';
      return;
    }

    location.href = 'index.html';
  } catch (err) {
    errorMsg.textContent = 'حدث خطأ في الاتصال، حاول مرة أخرى';
    errorMsg.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'دخول';
  }
});
</script>
</body>
</html>
